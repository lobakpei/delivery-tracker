<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>愛恨監獄 • Tamagotchi Sims</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Sans+HK:wght@400;500;700&display=swap');

:root {
--primary: #c026ff;
}

body {
font-family: 'Noto Sans HK', 'Noto Sans TC', system-ui, sans-serif;
}

.game-container {
max-width: 420px;
margin: 0 auto;
background: #0f0a1f;
min-height: 100dvh;
box-shadow: 0 0 0 12px #1a1530;
}

.stat-bar {
height: 10px;
background: #2a2540;
border-radius: 9999px;
overflow: hidden;
}

.stat-fill {
height: 100%;
transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.character-card {
transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.character-card:hover {
transform: translateY(-4px);
box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
}

.love { border-color: #f472b6; }
.hate { border-color: #f87171; }

.modal {
animation: modalPop 0.2s ease-out forwards;
}

@keyframes modalPop {
from { transform: scale(0.9) translateY(20px); opacity: 0; }
to { transform: scale(1) translateY(0); opacity: 1; }
}

.action-btn {
transition: all 0.1s ease;
}

.action-btn:active {
transform: scale(0.95);
}

.prison-bg {
background: linear-gradient(145deg, #1a1530, #0f0a1f);
}

.stat-label {
font-size: 0.75rem;
font-weight: 500;
}
</style>
</head>
<body class="bg-[#0a0818] text-white">
<div class="game-container mx-auto border border-[#2a2540] min-h-screen flex flex-col">

<!-- Header -->
<div class="bg-[#1a1530] px-4 py-3 flex items-center justify-between border-b border-[#2a2540]">
<div>
<h1 class="text-2xl font-bold tracking-tight">愛恨監獄</h1>
<p class="text-xs text-pink-400">他媽哥池 × The Sims</p>
</div>
<div class="text-right">
<div class="text-sm font-medium" id="time-display">第 <span id="day">1</span> 日　<span id="hour">08</span>:00</div>
<div class="text-[10px] text-gray-400">管理分數 <span id="score" class="font-bold text-pink-400">128</span></div>
</div>
</div>

<!-- Quick Action -->
<div class="px-4 pt-3 pb-2 bg-[#1a1530]">
<button onclick="advanceTime()"
class="w-full bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 active:scale-[0.985] transition-all text-white font-semibold py-3 rounded-2xl flex items-center justify-center gap-x-2 shadow-lg">
<i class="fa-solid fa-clock mr-2"></i>
<span class="font-bold">前進 4 小時</span>
</button>
</div>

<!-- Tabs -->
<div class="flex border-b border-[#2a2540] bg-[#1a1530]">
<button onclick="switchTab(0)" id="tab-0"
class="flex-1 py-3 text-sm font-medium border-b-2 border-pink-500 text-pink-400">居民列表</button>
<button onclick="switchTab(1)" id="tab-1"
class="flex-1 py-3 text-sm font-medium text-gray-400">創建角色</button>
<button onclick="switchTab(2)" id="tab-2"
class="flex-1 py-3 text-sm font-medium text-gray-400">日誌</button>
</div>

<!-- Content Area -->
<div class="flex-1 overflow-auto p-4" id="main-content">

<!-- Residents Tab -->
<div id="tab-content-0">
<div class="flex justify-between items-center mb-3 px-1">
<div>
<span class="font-semibold">目前居民</span>
<span id="resident-count" class="ml-2 text-xs bg-[#2a2540] px-2 py-0.5 rounded-full">0</span>
</div>
<button onclick="switchTab(1)"
class="text-xs flex items-center gap-x-1 text-pink-400 hover:text-pink-300">
<i class="fa-solid fa-plus"></i>
<span>新增</span>
</button>
</div>

<div id="residents-grid" class="grid grid-cols-2 gap-3">
<!-- Populated by JS -->
</div>

<div id="empty-state" class="hidden text-center py-10">
<i class="fa-solid fa-user-slash text-5xl text-gray-600 mb-3"></i>
<p class="text-gray-400">仲未有居民<br>快啲創建第一個角色啦！</p>
</div>
</div>

<!-- Create Tab -->
<div id="tab-content-1" class="hidden">
<div class="bg-[#1a1530] rounded-3xl p-5 border border-[#2a2540]">
<h3 class="font-bold mb-4 flex items-center gap-x-2">
<i class="fa-solid fa-user-plus text-pink-400"></i>
創建新角色
</h3>

<div class="space-y-4">
<!-- Name -->
<div>
<label class="text-xs text-gray-400 block mb-1">角色名字</label>
<input id="char-name" type="text" placeholder="例如：小美 / 阿強 / 老闆"
class="w-full bg-[#2a2540] border border-[#3f3855] rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-pink-500">
</div>

<!-- Type -->
<div>
<label class="text-xs text-gray-400 block mb-1">呢個係...</label>
<div class="grid grid-cols-2 gap-3">
<button onclick="selectType('love')" id="type-love"
class="flex items-center justify-center gap-x-2 py-3 rounded-2xl border-2 border-pink-500 bg-pink-950/30 text-pink-400">
<i class="fa-solid fa-heart"></i>
<span class="font-medium">❤️ 愛嘅人</span>
</button>
<button onclick="selectType('hate')" id="type-hate"
class="flex items-center justify-center gap-x-2 py-3 rounded-2xl border-2 border-red-500 bg-red-950/30 text-red-400">
<i class="fa-solid fa-skull"></i>
<span class="font-medium">😠 憎嘅人</span>
</button>
</div>
</div>

<!-- Avatar -->
<div>
<label class="text-xs text-gray-400 block mb-1">頭像（選一個）</label>
<div id="emoji-picker" class="grid grid-cols-6 gap-2 bg-[#2a2540] p-3 rounded-2xl">
<!-- Populated by JS -->
</div>
</div>

<button onclick="createCharacter()"
class="mt-2 w-full bg-white text-black font-bold py-3.5 rounded-2xl active:scale-[0.985] transition">
確認放入監獄 / Haven
</button>
</div>
</div>
</div>

<!-- Log Tab -->
<div id="tab-content-2" class="hidden">
<div class="bg-[#1a1530] rounded-3xl p-4 border border-[#2a2540] min-h-[300px]">
<div class="flex justify-between items-center mb-3">
<span class="font-semibold">事件日誌</span>
<button onclick="clearLogs()" class="text-xs text-red-400 hover:text-red-300">清除</button>
</div>
<div id="log-list" class="space-y-2 text-sm max-h-[420px] overflow-auto pr-1">
<!-- Logs populated by JS -->
</div>
</div>
</div>

</div>

<!-- Footer hint -->
<div class="text-center py-2 text-[10px] text-gray-500 border-t border-[#2a2540]">
數據自動儲存 • 長按角色卡可快速照顧
</div>
</div>

<!-- Character Detail Modal -->
<div id="modal" onclick="if (event.target.id === 'modal') closeModal()"
class="hidden fixed inset-0 bg-black/70 flex items-end md:items-center justify-center z-50">
<div onclick="event.stopImmediatePropagation()"
class="modal bg-[#1a1530] w-full md:w-[400px] md:rounded-t-3xl md:rounded-b-3xl rounded-t-3xl p-5 border-t border-[#2a2540]">

<div class="flex justify-between items-start mb-4">
<div id="modal-header" class="flex items-center gap-x-3"></div>
<button onclick="closeModal()" class="text-2xl leading-none text-gray-400 hover:text-white">×</button>
</div>

<!-- Stats -->
<div id="modal-stats" class="space-y-3 mb-5"></div>

<!-- Actions -->
<div>
<div class="text-xs text-gray-400 mb-2 px-1">可執行行動</div>
<div id="modal-actions" class="grid grid-cols-2 gap-2"></div>
</div>

<div class="mt-4 text-center">
<button onclick="closeModal()"
class="text-sm text-gray-400 hover:text-white">關閉</button>
</div>
</div>
</div>

<script>
// ==================== GAME DATA ====================
let characters = [];
let logs = [];
let currentDay = 1;
let currentHour = 8;
let managementScore = 128;
let selectedType = 'love';
let selectedEmoji = '😊';

const EMOJIS = ['😊','👩','🧔','👨','👩‍🦰','🧔‍♀️','😈','🥰','😡','🤠','👻','🐱','🐶','🦊','🐼'];

function loadData() {
const saved = localStorage.getItem('lovehate_prison');
if (saved) {
const data = JSON.parse(saved);
characters = data.characters || [];
logs = data.logs || [];
currentDay = data.currentDay || 1;
currentHour = data.currentHour || 8;
managementScore = data.managementScore || 128;
} else {
// First time - add 2 example characters
characters = [
{
id: Date.now(),
name: "小美",
type: "love",
emoji: "🥰",
hunger: 85, happiness: 92, energy: 78, hygiene: 88, social: 95,
lastUpdate: Date.now()
},
{
id: Date.now() + 1,
name: "阿強",
type: "hate",
emoji: "😡",
hunger: 60, happiness: 35, energy: 55, hygiene: 40, social: 30,
lastUpdate: Date.now()
}
 ];
addLog("歡迎來到愛恨監獄！小美（愛的人）同阿強（憎的人）已經入住。");
saveData();
}
updateUI();
}

function saveData() {
localStorage.setItem('lovehate_prison', JSON.stringify({
characters, logs, currentDay, currentHour, managementScore
}));
}

function addLog(text) {
logs.unshift({
time: ${currentDay}日 ${currentHour.toString().padStart(2,'0')}:00,
text: text
});
if (logs.length > 30) logs.pop();
saveData();
}

// ==================== UI ====================
function updateUI() {
// Time
document.getElementById('day').textContent = currentDay;
document.getElementById('hour').textContent = currentHour.toString().padStart(2, '0');
document.getElementById('score').textContent = managementScore;

// Residents count
document.getElementById('resident-count').textContent = characters.length;

// Render residents grid
renderResidents();

// Render logs if on that tab
if (!document.getElementById('tab-content-2').classList.contains('hidden')) {
renderLogs();
}
}

function renderResidents() {
const container = document.getElementById('residents-grid');
const empty = document.getElementById('empty-state');

container.innerHTML = '';

if (characters.length === 0) {
empty.classList.remove('hidden');
return;
}
empty.classList.add('hidden');

characters.forEach(char => {
const mood = getMood(char);
const avg = Math.round((char.hunger + char.happiness + char.energy + char.hygiene + char.social) / 5);

const div = document.createElement('div');
div.className = character-card bg-[#1a1530] border-2 rounded-3xl p-3 cursor-pointer ${char.type === 'love' ? 'love border-pink-500' : 'hate border-red-500'}; div.innerHTML =
<div class="flex justify-between items-start">
<div class="text-5xl">${char.emoji}&lt;/div&gt; &lt;div class="text-right"&gt; &lt;div class="text-xs px-2 py-0.5 rounded-full ${char.type === 'love' ? 'bg-pink-950 text-pink-400' : 'bg-red-950 text-red-400'}">
`${char.type === 'love' ? '❤️ Haven' : '😠 Prison'}
</div>
</div>
</div>

<div class="mt-2">
<div class="font-bold text-lg leading-none">latex
{char.name}&lt;/div&gt; &lt;div class="flex items-center gap-x-1 mt-1"&gt; &lt;div class="text-xs \( {mood.color}"&gt; \){mood.emoji} 

{mood.text}</div>
<div class="text-[10px] text-gray-400">($`{avg}%)</div>
</div>
</div>

<div class="mt-3 space-y-1.5">
${createMiniStat('飢餓', char.hunger, '#f59e0b')} ${createMiniStat('快樂', char.happiness, '#ec4899')}
</div>
`;

div.onclick = () => openModal(char.id);
// Long press for quick care
let pressTimer;
div.onmousedown = () => {
pressTimer = setTimeout(() => quickCare(char.id), 600);
};
div.onmouseup = () => clearTimeout(pressTimer);
div.ontouchstart = () => {
pressTimer = setTimeout(() => quickCare(char.id), 600);
};
div.ontouchend = () => clearTimeout(pressTimer);

container.appendChild(div);
});
}

function createMiniStat(label, value, color) {
return &lt;div class="flex items-center gap-x-2 text-xs"&gt; &lt;span class="w-8 text-gray-400"&gt;${label}</span>
<div class="flex-1 stat-bar">
<div class="stat-fill" style="width: {color}"></div>
</div>
<span class="w-7 text-right font-mono">${value}&lt;/span&gt; &lt;/div&gt;;
}

function getMood(char) {
const avg = (char.hunger + char.happiness + char.energy + char.hygiene + char.social) / 5;
if (avg >= 85) return { emoji: '😍', text: '非常滿足', color: 'text-pink-400' };
if (avg >= 65) return { emoji: '🙂', text: '狀態不錯', color: 'text-emerald-400' };
if (avg >= 40) return { emoji: '😐', text: '一般', color: 'text-yellow-400' };
return { emoji: '😫', text: '需要照顧', color: 'text-red-400' };
}

// ==================== TABS ====================
function switchTab(tab) {
// Hide all
document.querySelectorAll('[id^="tab-content-"]').forEach(el => el.classList.add('hidden'));
document.querySelectorAll('[id^="tab-"]').forEach(el => {
el.classList.remove('border-b-2', 'border-pink-500', 'text-pink-400');
el.classList.add('text-gray-400');
});

// Show selected
document.getElementById(tab-content-${tab}).classList.remove('hidden'); const tabBtn = document.getElementById(tab-${tab});
tabBtn.classList.add('border-b-2', 'border-pink-500', 'text-pink-400');
tabBtn.classList.remove('text-gray-400');

if (tab === 2) renderLogs();
}

function renderLogs() {
const container = document.getElementById('log-list');
container.innerHTML = '';

if (logs.length === 0) {
container.innerHTML = <p class="text-center text-gray-500 py-8 text-sm"&gt;仲未有事件...&lt;/p>;
return;
}

logs.forEach(log => {
const div = document.createElement('div');
div.className = 'bg-[#2a2540] px-3 py-2 rounded-2xl text-sm';
div.innerHTML = &lt;span class="font-mono text-[10px] text-gray-500"&gt;${log.time}</span><br>
<span>${log.text}&lt;/span&gt;;
container.appendChild(div);
});
}

function clearLogs() {
if (confirm('確定清除所有日誌？')) {
logs = [];
saveData();
renderLogs();
}
}

// ==================== CREATE CHARACTER ====================
function initEmojiPicker() {
const picker = document.getElementById('emoji-picker');
picker.innerHTML = '';

EMOJIS.forEach(emoji => {
const btn = document.createElement('button');
btn.className = text-3xl p-1.5 rounded-xl hover:bg-[#3f3855] transition${emoji === selectedEmoji ? 'bg-pink-600' : ''}`;
btn.textContent = emoji;
btn.onclick = () => {
selectedEmoji = emoji;
// refresh picker
initEmojiPicker();
};
picker.appendChild(btn);
});
}

function selectType(type) {
selectedType = type;

const loveBtn = document.getElementById('type-love');
const hateBtn = document.getElementById('type-hate');

if (type === 'love') {
loveBtn.classList.add('border-pink-500', 'bg-pink-950/30');
hateBtn.classList.remove('border-red-500', 'bg-red-950/30');
} else {
hateBtn.classList.add('border-red-500', 'bg-red-950/30');
loveBtn.classList.remove('border-pink-500', 'bg-pink-950/30');
}
}

function createCharacter() {
const nameInput = document.getElementById('char-name').value.trim();
if (!nameInput) {
alert('請輸入角色名字！');
return;
}

const newChar = {
id: Date.now(),
name: nameInput,
type: selectedType,
emoji: selectedEmoji,
hunger: selectedType === 'love' ? 85 : 55,
happiness: selectedType === 'love' ? 90 : 40,
energy: 75,
hygiene: selectedType === 'love' ? 80 : 50,
social: selectedType === 'love' ? 85 : 35,
lastUpdate: Date.now()
};

characters.push(newChar);

const wing = selectedType === 'love' ? 'Haven Wing（愛之翼）' : 'Prison Wing（憎之翼）';
addLog(新角色「\( {nameInput}」已加入 \){wing}。);

// Reset form
document.getElementById('char-name').value = '';
selectedEmoji = '😊';
selectedType = 'love';
initEmojiPicker();
selectType('love');

saveData();
updateUI();
switchTab(0); // back to list
}

// ==================== MODAL & ACTIONS ====================
let currentCharId = null;

function openModal(id) {
currentCharId = id;
const char = characters.find(c => c.id === id);
if (!char) return;

const modal = document.getElementById('modal');
const header = document.getElementById('modal-header');
const statsContainer = document.getElementById('modal-stats');
const actionsContainer = document.getElementById('modal-actions');

// Header
header.innerHTML = &lt;div class="text-6xl"&gt;${char.emoji}</div>
<div>
<div class="font-bold text-2xl">${char.name}&lt;/div&gt; &lt;div class="text-sm ${char.type === 'love' ? 'text-pink-400' : 'text-red-400'}">
${char.type === 'love' ? '❤️ Haven Wing' : '😠 Prison Wing'} &lt;/div&gt; &lt;/div&gt;;

// Stats
statsContainer.innerHTML = ${createStatRow('飢餓', char.hunger, '#f59e0b', 'fa-utensils')}
${createStatRow('快樂', char.happiness, '#ec4899', 'fa-heart')} ${createStatRow('精力', char.energy, '#3b82f6', 'fa-bolt')}
${createStatRow('衛生', char.hygiene, '#14b8a6', 'fa-shower')} ${createStatRow('社交', char.social, '#8b5cf6', 'fa-users')}
`;

// Actions (different for love/hate)
actionsContainer.innerHTML = '';

const actions = char.type === 'love' ? [
{ label: '餵食', icon: 'fa-utensils', change: {hunger: 18, energy: -4} },
{ label: '聊天', icon: 'fa-comments', change: {happiness: 15, social: 12} },
{ label: '送禮物', icon: 'fa-gift', change: {happiness: 22, energy: -8} },
{ label: '按摩', icon: 'fa-hand-holding-heart', change: {happiness: 18, energy: 10} },
 ] : [
{ label: '餵食', icon: 'fa-utensils', change: {hunger: 15} },
{ label: '訓話', icon: 'fa-comment-dots', change: {happiness: -8, social: 5} },
{ label: '罰做工', icon: 'fa-hammer', change: {energy: -15, hunger: -5, hygiene: -8} },
{ label: '給予反思時間', icon: 'fa-user-clock', change: {happiness: 12, energy: 8} },
 ];

actions.forEach(action => {
const btn = document.createElement('button');
btn.className = action-btn flex items-center justify-center gap-x-2 bg-[#2a2540] hover:bg-[#3f3855] active:bg-[#4a425f] px-3 py-3 rounded-2xl text-sm font-medium;
btn.innerHTML = &lt;i class="fa-solid${action.icon} w-4"></i>
<span>${action.label}&lt;/span&gt;;
btn.onclick = () => performAction(id, action.change, action.label);
actionsContainer.appendChild(btn);
});

modal.classList.remove('hidden');
modal.classList.add('flex');
}

function createStatRow(label, value, color, icon) {
return &lt;div class="flex items-center gap-x-3"&gt; &lt;i class="fa-solid${icon} w-5 text-center" style="color: {label}</span>
<span class="font-mono">{value}%; background: ${color}"></div>
</div>
</div>
</div>
`;
}

function performAction(charId, changes, actionName) {
const charIndex = c
