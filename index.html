/* =========================================================================
   DESIGN TOKENS
   Cold-river palette + safety-signage accents. One display face
   (Bricolage Grotesque) for identity; system stack for body & numbers.
   ========================================================================= */
:root{
  --ink:#0E2A32;          /* deep river-slate — primary text            */
  --ink-soft:#4B6570;     /* secondary text                             */
  --paper:#F2F6F5;        /* cool mist background                       */
  --card:#FFFFFF;
  --line:#D8E2E1;
  --water:#14646E;        /* teal-slate primary                         */
  --water-deep:#0C4A52;
  --go:#1F8A4C;
  --caution:#D9820F;
  --nogo:#C6362C;
  --unknown:#7A8C93;
  --sewage:#8A5A2B;       /* brown overlay + advisory                   */
  --radius:14px;
  --shadow:0 2px 10px rgba(14,42,50,.10);
  --display:'Bricolage Grotesque', system-ui, sans-serif;
  --body:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--body);
  background:var(--paper);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  padding-bottom:env(safe-area-inset-bottom);
}
button{font:inherit;cursor:pointer}
a{color:var(--water-deep)}
:focus-visible{outline:3px solid var(--water);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}

/* ---------- Header ---------- */
header.app{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px calc(6px);
  padding-top:calc(10px + env(safe-area-inset-top));
}
.brand{font-family:var(--display);font-weight:800;font-size:1.35rem;letter-spacing:-.02em;color:var(--water-deep)}
.brand .tag{display:block;font-family:var(--body);font-weight:400;font-size:.72rem;color:var(--ink-soft);letter-spacing:.01em}
.icon-btn{
  min-width:44px;min-height:44px;border:1px solid var(--line);border-radius:50%;
  background:var(--card);color:var(--water-deep);font-size:1.05rem;font-weight:700;
  display:inline-flex;align-items:center;justify-content:center;box-shadow:var(--shadow);
}

/* ---------- Verdict banner (signature element: slipway gauge-board) ---------- */
.verdict{
  margin:2px 12px 10px;border-radius:var(--radius);background:var(--card);
  box-shadow:var(--shadow);overflow:hidden;display:flex;min-height:74px;
}
.verdict .gauge{
  width:16px;flex:0 0 16px;
  /* painted depth-gauge stripes, tinted by verdict colour */
  background:
    repeating-linear-gradient(to bottom,
      var(--v,#7A8C93) 0 14px,
      color-mix(in srgb, var(--v,#7A8C93) 55%, white) 14px 28px);
  transition:background .35s ease;
}
.verdict .body{padding:10px 14px;display:flex;flex-direction:column;justify-content:center;gap:2px;flex:1}
.verdict .chip{
  font-family:var(--display);font-weight:800;font-size:1.28rem;letter-spacing:.01em;
  color:var(--v,#7A8C93);display:flex;align-items:center;gap:8px;transition:color .35s ease;
}
.verdict .chip .spotname{font-family:var(--body);font-weight:600;font-size:.8rem;color:var(--ink-soft);letter-spacing:0}
.verdict .reason{font-size:.9rem;color:var(--ink);line-height:1.3}
.verdict .small{font-size:.72rem;color:var(--ink-soft)}

/* ---------- Map ---------- */
.map-wrap{position:relative;margin:0 12px;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
#map{height:52vh;min-height:320px;background:#DCE7E6}
.map-controls{position:absolute;top:10px;right:10px;z-index:800;display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.toggle{
  min-height:40px;padding:0 14px;border-radius:999px;border:1px solid var(--line);
  background:rgba(255,255,255,.94);color:var(--ink);font-size:.82rem;font-weight:600;
  display:flex;align-items:center;gap:6px;box-shadow:var(--shadow);
}
.toggle[aria-pressed="true"]{background:var(--water);border-color:var(--water);color:#fff}
.locate-btn{
  position:absolute;bottom:14px;right:10px;z-index:800;
  width:48px;height:48px;border-radius:50%;border:1px solid var(--line);
  background:rgba(255,255,255,.96);box-shadow:var(--shadow);font-size:1.2rem;
}
/* Leaflet pin: verdict-coloured dot */
.pin{width:26px;height:26px;border-radius:50%;border:3px solid #fff;box-shadow:0 1px 6px rgba(0,0,0,.35)}
.pin.sel{transform:scale(1.35)}
.user-dot{width:18px;height:18px;border-radius:50%;background:#2E6BFF;border:3px solid #fff;box-shadow:0 0 0 6px rgba(46,107,255,.22)}
.p-mark{width:20px;height:20px;border-radius:5px;background:#3A6EA5;color:#fff;font:700 12px/20px var(--body);text-align:center;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.s-mark{width:20px;height:20px;border-radius:50%;background:#0C4A52;color:#fff;font:700 11px/18px var(--body);text-align:center;border:2px solid #fff}
.leaflet-container{font-family:var(--body)}

/* ---------- Conditions strip ---------- */
.conditions{margin:10px 12px 14px}
.cond-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.cell{
  background:var(--card);border-radius:12px;box-shadow:var(--shadow);
  padding:10px 8px;text-align:center;min-height:74px;
  display:flex;flex-direction:column;justify-content:center;gap:2px;
}
.cell .k{font-size:.68rem;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em}
.cell .v{font-family:var(--display);font-weight:700;font-size:1.05rem;font-variant-numeric:tabular-nums}
.cell .u{font-size:.68rem;color:var(--ink-soft)}
.cell.warn .v{color:var(--caution)}
.cell.bad  .v{color:var(--nogo)}
.wind-arrow{display:inline-block;transition:transform .4s ease}
.cond-foot{margin-top:6px;font-size:.72rem;color:var(--ink-soft);text-align:center}

/* ---------- Detail bottom sheet ---------- */
.sheet-backdrop{
  position:fixed;inset:0;background:rgba(14,42,50,.35);z-index:900;
  opacity:0;pointer-events:none;transition:opacity .25s ease;
}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:901;
  background:var(--card);border-radius:20px 20px 0 0;box-shadow:0 -6px 24px rgba(0,0,0,.2);
  max-height:82vh;overflow-y:auto;overscroll-behavior:contain;
  transform:translateY(105%);transition:transform .3s ease;
  padding:8px 16px calc(18px + env(safe-area-inset-bottom));
}
body.sheet-open .sheet{transform:translateY(0)}
body.sheet-open .sheet-backdrop{opacity:1;pointer-events:auto}
.sheet .grab{width:44px;height:5px;border-radius:3px;background:var(--line);margin:4px auto 10px}
.sheet h2{font-family:var(--display);font-weight:800;font-size:1.25rem;margin:0 0 2px;letter-spacing:-.01em}
.sheet .sub{font-size:.85rem;color:var(--ink-soft);margin-bottom:10px}
.badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.badge{font-size:.72rem;font-weight:600;padding:4px 10px;border-radius:999px;background:var(--paper);border:1px solid var(--line);color:var(--ink)}
.factor{display:flex;gap:8px;align-items:flex-start;font-size:.86rem;margin:6px 0}
.factor .dot{width:10px;height:10px;border-radius:50%;flex:0 0 10px;margin-top:4px}
.kv{font-size:.86rem;margin:8px 0;line-height:1.45}
.kv b{font-weight:700}
.hazard{background:#FBEFE9;border:1px solid #F0CFC0;border-radius:10px;padding:8px 10px;font-size:.85rem;margin:8px 0}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0 4px}
.act{
  min-height:48px;border-radius:12px;border:1px solid var(--line);background:var(--paper);
  font-weight:700;font-size:.86rem;color:var(--water-deep);
  display:flex;align-items:center;justify-content:center;gap:6px;text-decoration:none;padding:6px 8px;text-align:center;
}
.act.primary{background:var(--water);border-color:var(--water);color:#fff}
.parking-list{margin:8px 0 0;padding:0;list-style:none}
.parking-list li{font-size:.84rem;padding:8px 0;border-top:1px solid var(--line)}
.muted{color:var(--ink-soft);font-size:.8rem}
.sheet .close{position:absolute;top:10px;right:12px}

/* ---------- Info modal ---------- */
.modal{
  position:fixed;inset:0;z-index:950;display:none;align-items:flex-end;justify-content:center;
  background:rgba(14,42,50,.4);
}
.modal.open{display:flex}
.modal .panel{
  background:var(--card);border-radius:20px 20px 0 0;max-height:85vh;overflow-y:auto;
  padding:16px 18px calc(20px + env(safe-area-inset-bottom));width:100%;max-width:640px;
}
.modal h2{font-family:var(--display);font-weight:800;margin:4px 0 8px}
.modal h3{font-size:.95rem;margin:16px 0 4px}
.modal p, .modal li{font-size:.86rem;line-height:1.5;color:var(--ink)}
.modal .ver{font-size:.72rem;color:var(--ink-soft);margin-top:14px}

/* ---------- Toast + skeleton ---------- */
.toast{
  position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  background:var(--ink);color:#fff;font-size:.82rem;padding:10px 16px;border-radius:999px;
  z-index:990;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .3s;
  max-width:88vw;text-align:center;
}
.toast.show{opacity:1}
.skel{color:transparent!important;background:linear-gradient(90deg,#E4ECEB 25%,#F0F5F4 50%,#E4ECEB 75%);background-size:200% 100%;animation:sk 1.2s infinite;border-radius:6px}
@keyframes sk{from{background-position:200% 0}to{background-position:-200% 0}}

@media (min-width:700px){
  body{max-width:720px;margin:0 auto}
  .sheet,.modal .panel{max-width:720px;margin:0 auto}
}
</style>
</head>

<script>
'use strict';
/* =========================================================================
 * PaddleReady — UK SUP pre-trip dashboard (MVP)
 * Single-file vanilla app. Sections:
 *   S0 CONFIG / THRESHOLDS / STRINGS      S5 Verdict engine
 *   S1 LAUNCH_POINTS (static, curated)    S6 Map layer
 *   S2 Utilities                          S7 UI render
 *   S3 Cache layer (localStorage)         S8 Events + boot
 *   S4 API layer (independent, degradable) S9 PWA (manifest + SW hook)
 * Every data layer degrades on its own: a failed fetch dims one widget,
 * never the page.
 * ======================================================================= */

/* ============================== S0 CONFIG =============================== */
const CONFIG = {
  APP_VERSION: 'v0.1.1 (2026-07-06)',

  /* Feature flags — flip any layer off without touching its code. */
  FEATURES: { weather: true, river: true, sewage: true, parking: true },

  /* Open-Meteo — free, no key, CORS-enabled. */
  WEATHER_URL: (lat, lng) =>
    'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lng +
    '&current=temperature_2m,precipitation,wind_speed_10m,wind_gusts_10m,wind_direction_10m,weather_code' +
    '&hourly=precipitation,wind_speed_10m,wind_gusts_10m' +
    '&wind_speed_unit=mph&timezone=Europe%2FLondon&past_days=1&forecast_days=2',

  /* Environment Agency real-time flood-monitoring API — England only,
     free, open, no key. Designed for browser use (CORS enabled). */
  EA_BASE: 'https://environment.data.gov.uk/flood-monitoring/',
  EA_STATION_SEARCH_KM: 10,

  /* Storm-overflow downstream-impact GeoJSON (sewagemap.co.uk, CC-BY-SA).
     TODO: user to add the URL — copy the "Downstream impacted reaches
     (incl. last 48 hrs)" link for Severn Trent (or the company covering
     your area) from the "Water Company Data Table" in the README at
     https://github.com/AlexLipp/sewage-map
     Confirmed from that repo's backend source: files live in S3 bucket
     "thamessewage" behind CloudFront at keys like
       downstream_impact/severntrent/severntrent_now_incl_48hrs.geojson
     (WGS84 FeatureCollection, refreshed ~every 15–20 min). The public
     CloudFront hostname is deliberately NOT guessed here — paste the
     exact link from the README table. Leave blank to disable the layer;
     everything else keeps working. */
  SEWAGE_GEOJSON_URL: '',   // TODO: user to add URL (see note above)

  /* Overpass API (OpenStreetMap) — community-run, CORS-enabled, rate-
     limited. Only queried on demand + cached 24 h per spot. */
  OVERPASS_URL: 'https://overpass-api.de/api/interpreter',
  PARKING_RADIUS_M: 1000,
  SLIPWAY_RADIUS_M: 800,

  /* What3Words — display links need no key. Live lat/long → W3W
     conversion needs a key. Leave blank to fall back to a maps pin. */
  W3W_API_KEY: '',          // TODO (optional): user to add key

  /* park4night hand-off. A coordinate deep-link format could not be
     confirmed from official docs, so per spec we open the homepage.
     Candidate to test by hand and swap in if it works:
     'https://park4night.com/en/search?lat={lat}&lng={lng}'            */
  PARK4NIGHT_URL: 'https://park4night.com',

  /* Cache freshness windows (minutes). */
  FRESH_MIN: { weather: 15, river: 15, sewage: 20, parking: 60 * 24 },

  FETCH_TIMEOUT_MS: 10000,
  OVERPASS_TIMEOUT_MS: 26000,

  /* Default view if geolocation is denied/unavailable: the Midlands. */
  DEFAULT_CENTER: [52.19, -2.10],
  DEFAULT_ZOOM: 9,

  DEBUG: false
};

/* Every verdict threshold lives here — tune without touching logic.
   Flat-water SUP defaults, wind in mph, rain in mm, river relative to the
   station's EA typical range. */
const THRESHOLDS = {
  gustMph:   { amberAt: 12, redAt: 18 },   // ≤12 green · 12–18 amber · >18 red
  windMph:   { amberAt: 10, redAt: 15 },   // ≤10 green · 10–15 amber · >15 red
  rain:      { last24hMm: 8, next6hMm: 2 },// either exceeded → amber
  river:     { redAboveHighFactor: 1.2 },  // >120 % of typicalRangeHigh → red
  sewage:    { proximityKm: 1.5 }          // impacted reach within → amber flag
};

/* All user-facing text. Add a second language by cloning STRINGS.en. */
const STRINGS = {
  en: {
    tagline: 'Go or no-go, before you leave home',
    advisory: 'Advisory only — conditions change fast. Your call on the water.',
    loading: 'Checking conditions…',
    verdict: { go: 'GO', caution: 'CAUTION', nogo: 'NO-GO', unknown: 'NO DATA' },
    verdictEmoji: { go: '🟢', caution: '🟡', nogo: '🔴', unknown: '⚪️' },
    nearestSpot: 'Nearest spot',
    selectedSpot: 'Selected spot',
    reasons: {
      allClear: 'Wind, river and rain all look friendly right now.',
      gustAmber: 'gusts {v} mph', gustRed: 'gusts {v} mph — above the red line',
      windAmber: 'steady wind {v} mph', windRed: 'steady wind {v} mph — above the red line',
      rain24: '{v} mm of rain in the last 24 h (rivers rise, overflow risk up)',
      rain6: 'rain forecast in the next 6 h',
      riverAmber: 'river above its typical range ({v} m)',
      riverRed: 'river well above its typical range ({v} m)',
      riverLowNote: 'river below its typical low ({v} m) — watch for shallows',
      sewage: 'storm overflow recently active nearby — check conditions yourself',
      noData: 'Live data unavailable — showing what we know.'
    },
    cells: { wind: 'Wind', gust: 'Gusts', rain: 'Rain 6 h', river: 'River' },
    mph: 'mph', mm: 'mm', metres: 'm',
    riverNormal: 'normal', riverHigh: 'high', riverVeryHigh: 'very high', riverLow: 'low',
    riverNoRange: 'no typical range available',
    riverUnavailable: 'River level unavailable for this spot.',
    gauge: 'gauge', gaugeAuto: 'nearest gauge (auto)',
    updated: 'Updated {t}',
    staleNote: "Couldn't refresh — showing {t} data.",
    offline: 'Offline — showing last-known data.',
    toggles: { sewage: 'Sewage', parking: 'Car parks' },
    sewageUnconfigured: 'Sewage layer not set up yet — add the data URL in CONFIG (see the info panel).',
    sewageUnavailable: "Couldn't load the sewage overlay right now.",
    sewageLegend: 'Brown = river reaches downstream of a storm overflow active in the last 48 h (sewagemap.co.uk).',
    locating: 'Finding you…',
    locateDenied: 'No location — browse the map and tap a pin instead.',
    distanceAway: '{v} km away',
    launchType: { slipway: 'Slipway', riverbank: 'Riverbank', steps: 'Steps', beach: 'Beach' },
    difficulty: { easy: 'Easy', moderate: 'Moderate', hard: 'Hard' },
    whyVerdict: 'Why this verdict',
    parkingHeading: 'Parking',
    free: 'free', paid: 'paid',
    route: 'Route', hazards: 'Hazards', notes: 'Notes',
    actions: {
      w3w: 'What3Words', directions: 'Directions',
      carparks: 'Nearby car parks', overnight: 'Overnight (park4night)',
      share: 'Share spot', shareMyLoc: 'Share my location'
    },
    slipway: 'Slipway',
    parkingNone: 'No parking data from OpenStreetMap here.',
    parkingLoading: 'Asking OpenStreetMap…',
    parkingError: "Couldn't reach OpenStreetMap parking data just now.",
    slipwaysFound: 'Slipways nearby: {v}',
    copied: 'Link copied.',
    shareFail: "Couldn't share — link copied instead.",
    infoTitle: 'Data & disclaimer',
    verdictLegendTitle: 'How the verdict works',
    placeholderNote: 'Example spot — details unverified. Check before you rely on them.',
    info: {
      p1: 'PaddleReady gives informational estimates only. It fuses public weather, river-level and storm-overflow data into a convenience summary. It is not a safety assessment and it can be wrong. Conditions on the water change rapidly — you are responsible for your own judgement, your own safety, and for holding a valid waterways licence where required.',
      p2: 'Storm-overflow data never means water is "safe" or "unsafe". Sensors can false-trigger and the data carries no volume or concentration information. A flag simply means: a storm overflow was recorded active on this water body recently — check conditions yourself.',
      attribution: 'Attribution',
      a1: 'This uses Environment Agency flood and river level data from the real-time data API (Beta).',
      a2: 'Storm-overflow downstream-impact data: sewagemap.co.uk (CC-BY-SA).',
      a3: 'Weather: Open-Meteo.com. Map data © OpenStreetMap contributors. Parking/slipways via Overpass API.',
      howTitle: 'How the Go / No-Go verdict works',
      how: 'Each spot is scored on wind gusts, steady wind, recent + forecast rain, river level against the gauge\'s typical range, and nearby storm-overflow activity. The overall verdict is simply the worst contributing factor, and the reasons are always shown. Thresholds are flat-water SUP defaults and can be tuned in the app\'s CONFIG.'
    }
  }
};
let LANG = 'en';
const t = (path, vars) => {
  let s = path.split('.').reduce((o, k) => (o || {})[k], STRINGS[LANG]);
  if (typeof s !== 'string') return path;
  if (vars) for (const k in vars) s = s.replace('{' + k + '}', vars[k]);
  return s;
};

/* ============================ S2 UTILITIES ============================== */
const $ = (sel) => document.querySelector(sel);
const dbg = (...a) => { if (CONFIG.DEBUG) console.log('[PR]', ...a); };

function haversineKm(aLat, aLng, bLat, bLng) {
  const R = 6371, toR = Math.PI / 180;
  const dLat = (bLat - aLat) * toR, dLng = (bLng - aLng) * toR;
  const h = Math.sin(dLat / 2) ** 2 +
            Math.cos(aLat * toR) * Math.cos(bLat * toR) * Math.sin(dLng / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(h));
}

/* Compass letters describe where the wind comes FROM (met convention);
   the arrow is rotated to point where the wind is travelling TO, which is
   what a paddler intuitively reads. */
const COMPASS = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
const compassFrom = (deg) => COMPASS[Math.round(((deg % 360) + 360) % 360 / 22.5) % 16];

const fmtTime = (ms) => new Date(ms).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
const round1 = (n) => Math.round(n * 10) / 10;

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g,
    (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* =========================== S3 CACHE LAYER ============================= */
const cache = {
  set(key, value) {
    try { localStorage.setItem('pr:' + key, JSON.stringify({ t: Date.now(), v: value })); }
    catch (e) { dbg('cache set failed', e); /* quota — fail quietly */ }
  },
  get(key) {
    try {
      const raw = localStorage.getItem('pr:' + key);
      if (!raw) return null;
      const { t: at, v } = JSON.parse(raw);
      return { at, value: v };
    } catch (e) { return null; }
  }
};

/* Cache-first fetch: fresh cache → instant; else network → update cache;
   network fail → stale cache (flagged) → else null.                     */
async function cachedFetch(key, freshMinutes, fetcher) {
  const hit = cache.get(key);
  const freshMs = freshMinutes * 60 * 1000;
  if (hit && Date.now() - hit.at < freshMs) {
    return { value: hit.value, at: hit.at, stale: false, source: 'cache' };
  }
  try {
    const value = await fetcher();
    cache.set(key, value);
    return { value, at: Date.now(), stale: false, source: 'network' };
  } catch (e) {
    dbg('fetch failed for', key, e.message);
    if (hit) return { value: hit.value, at: hit.at, stale: true, source: 'stale' };
    return null;
  }
}

/* ============================ S4 API LAYER ============================== */
async function fetchJSON(url, opts = {}) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), opts.timeout || CONFIG.FETCH_TIMEOUT_MS);
  try {
    const res = await fetch(url, {
      method: opts.method || 'GET',
      body: opts.body || null,
      headers: opts.headers || {},
      signal: ctrl.signal
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  } finally { clearTimeout(timer); }
}

/* ---- 4a. Weather (Open-Meteo) ---- */
async function getWeather(spot) {
  if (!CONFIG.FEATURES.weather) return null;
  return cachedFetch('wx:' + spot.id, CONFIG.FRESH_MIN.weather, async () => {
    const data = await fetchJSON(CONFIG.WEATHER_URL(spot.lat, spot.lng));
    const cur = data.current || {};
    /* Derive trailing-24 h and next-6 h precipitation from the hourly
       series (past_days=1 gives us yesterday). */
    let rain24 = null, rain6 = null;
    const H = data.hourly;
    if (H && H.time && H.precipitation) {
      const now = Date.now();
      let idx = -1;
      for (let i = 0; i < H.time.length; i++) {
        if (new Date(H.time[i]).getTime() <= now) idx = i; else break;
      }
      if (idx >= 0) {
        rain24 = 0;
        for (let i = Math.max(0, idx - 23); i <= idx; i++) rain24 += H.precipitation[i] || 0;
        rain6 = 0;
        for (let i = idx + 1; i <= Math.min(H.time.length - 1, idx + 6); i++) rain6 += H.precipitation[i] || 0;
        rain24 = round1(rain24); rain6 = round1(rain6);
      }
    }
    return {
      tempC: cur.temperature_2m, rainNowMm: cur.precipitation,
      windMph: cur.wind_speed_10m, gustMph: cur.wind_gusts_10m,
      windDirDeg: cur.wind_direction_10m,
      rain24hMm: rain24, rainNext6hMm: rain6
    };
  });
}

/* ---- 4b. River level (Environment Agency, England only) ---- */
function eaNum(x) { return Array.isArray(x) ? x[0] : x; }

async function findNearestStation(spot) {
  const url = CONFIG.EA_BASE + 'id/stations?parameter=level&lat=' + spot.lat +
              '&long=' + spot.lng + '&dist=' + CONFIG.EA_STATION_SEARCH_KM + '&_limit=50';
  const data = await fetchJSON(url);
  const items = (data.items || []).filter((s) => s.stationReference && s.lat != null);
  if (!items.length) return null;
  items.sort((a, b) =>
    haversineKm(spot.lat, spot.lng, eaNum(a.lat), eaNum(a.long)) -
    haversineKm(spot.lat, spot.lng, eaNum(b.lat), eaNum(b.long)));
  return items[0].stationReference;
}

async function getRiver(spot) {
  if (!CONFIG.FEATURES.river) return null;
  return cachedFetch('ea:' + spot.id, CONFIG.FRESH_MIN.river, async () => {
    const ref = spot.eaStationRef || await findNearestStation(spot);
    if (!ref) return { unavailable: true };
    const auto = !spot.eaStationRef;

    const [det, latest] = await Promise.all([
      fetchJSON(CONFIG.EA_BASE + 'id/stations/' + encodeURIComponent(ref) + '.json'),
      fetchJSON(CONFIG.EA_BASE + 'id/stations/' + encodeURIComponent(ref) + '/readings?latest')
    ]);
    const st = det.items || {};
    const scale = st.stageScale || {};
    /* Prefer the main stage level measure if several exist. */
    const readings = latest.items || [];
    const pick = readings.find((r) => /level/.test(r.measure) && /-stage-/.test(r.measure)) ||
                 readings.find((r) => /level/.test(r.measure)) || readings[0];
    return {
      unavailable: !pick,
      stationRef: ref, auto,
      stationLabel: st.label || ref,
      riverName: st.riverName || '',
      valueM: pick ? pick.value : null,
      readAt: pick ? pick.dateTime : null,
      typicalHigh: scale.typicalRangeHigh != null ? eaNum(scale.typicalRangeHigh) : null,
      typicalLow: scale.typicalRangeLow != null ? eaNum(scale.typicalRangeLow) : null
    };
  });
}

async function getSewage() {

  const res = await cachedFetch('sewage', CONFIG.FRESH_MIN.sewage,
    () => fetchJSON(CONFIG.SEWAGE_GEOJSON_URL, { timeout: 15000 }));
  if (!res) return { status: 'error' };
  return { status: 'ok', fc: res.value, at: res.at, stale: res.stale };
}

/* Is any impacted reach within THRESHOLDS.sewage.proximityKm of the spot?
   Cheap two-stage test: a degree-window prefilter, then point→segment
   distance on a local equirectangular projection.                        */
function sewageNearSpot(fc, spot) {
  if (!fc || !fc.features) return null;
  const limKm = THRESHOLDS.sewage.proximityKm;
  const latWin = limKm / 110.5, lngWin = limKm / (111.3 * Math.cos(spot.lat * Math.PI / 180));
  const mPerLat = 110540, mPerLng = 111320 * Math.cos(spot.lat * Math.PI / 180);
  const limM = limKm * 1000;

  const px = 0, py = 0; // spot at local origin
  const toXY = (lng, lat) => [(lng - spot.lng) * mPerLng, (lat - spot.lat) * mPerLat];

  function segClose(a, b) {
    const [ax, ay] = toXY(a[0], a[1]), [bx, by] = toXY(b[0], b[1]);
    const dx = bx - ax, dy = by - ay;
    const len2 = dx * dx + dy * dy;
    let t2 = len2 ? ((px - ax) * dx + (py - ay) * dy) / len2 : 0;
    t2 = Math.max(0, Math.min(1, t2));
    const cx = ax + t2 * dx - px, cy = ay + t2 * dy - py;
    return (cx * cx + cy * cy) <= limM * limM;
  }
  function scanLine(coords) {
    for (let i = 0; i < coords.length - 1; i++) {
      const a = coords[i], b = coords[i + 1];
      /* prefilter: both ends well outside the window → skip */
      if (Math.abs(a[1] - spot.lat) > latWin && Math.abs(b[1] - spot.lat) > latWin) continue;
      if (Math.abs(a[0] - spot.lng) > lngWin && Math.abs(b[0] - spot.lng) > lngWin) continue;
      if (segClose(a, b)) return true;
    }
    return false;
  }
  for (const f of fc.features) {
    const g = f.geometry; if (!g) continue;
    if (g.type === 'LineString' && scanLine(g.coordinates)) return true;
    if (g.type === 'MultiLineString') {
      for (const line of g.coordinates) if (scanLine(line)) return true;
    }
  }
  return false;
}

/* ---- 4d. Parking + slipways (Overpass / OpenStreetMap) ---- */
async function getParking(spot) {
  if (!CONFIG.FEATURES.parking) return null;
  return cachedFetch('park:' + spot.id, CONFIG.FRESH_MIN.parking, async () => {
    const q = '[out:json][timeout:25];(' +
      'node["amenity"="parking"](around:' + CONFIG.PARKING_RADIUS_M + ',' + spot.lat + ',' + spot.lng + ');' +
      'way["amenity"="parking"](around:' + CONFIG.PARKING_RADIUS_M + ',' + spot.lat + ',' + spot.lng + ');' +
      'node["leisure"="slipway"](around:' + CONFIG.SLIPWAY_RADIUS_M + ',' + spot.lat + ',' + spot.lng + ');' +
      'way["leisure"="slipway"](around:' + CONFIG.SLIPWAY_RADIUS_M + ',' + spot.lat + ',' + spot.lng + ');' +
      ');out center;';
    const data = await fetchJSON(CONFIG.OVERPASS_URL, {
      method: 'POST',
      body: 'data=' + encodeURIComponent(q),
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      timeout: CONFIG.OVERPASS_TIMEOUT_MS
    });
    const parking = [], slipways = [];
    for (const el of (data.elements || [])) {
      const lat = el.lat != null ? el.lat : (el.center && el.center.lat);
      const lng = el.lon != null ? el.lon : (el.center && el.center.lon);
      if (lat == null) continue;
      const tags = el.tags || {};
      const item = {
        lat, lng,
        name: tags.name || null,
        fee: tags.fee || null,          // 'yes' | 'no' | null
        access: tags.access || null,
        km: round1(haversineKm(spot.lat, spot.lng, lat, lng))
      };
      if (tags.amenity === 'parking') parking.push(item);
      else if (tags.leisure === 'slipway') slipways.push(item);
    }
    parking.sort((a, b) => a.km - b.km);
    return { parking: parking.slice(0, 12), slipways: slipways.slice(0, 6) };
  });
}

/* ========================== S5 VERDICT ENGINE =========================== */
const LEVEL_ORDER = { unknown: -1, go: 0, caution: 1, nogo: 2 };
const worse = (a, b) => (LEVEL_ORDER[b] > LEVEL_ORDER[a] ? b : a);

/* Fuse the live inputs for one spot into {level, reasons[], factors[]}.
   Overall verdict = the worst contributing factor. Missing data never
   worsens a verdict — it is surfaced as a note instead.                  */
function assessSpot(wx, river, sewageNear) {
  const factors = []; // {level:'go|caution|nogo', msg}
  let sawData = false;

  if (wx) {
    sawData = true;
    const g = wx.gustMph, w = wx.windMph;
    if (g != null) {
      if (g > THRESHOLDS.gustMph.redAt) factors.push({ level: 'nogo', msg: t('reasons.gustRed', { v: Math.round(g) }) });
      else if (g > THRESHOLDS.gustMph.amberAt) factors.push({ level: 'caution', msg: t('reasons.gustAmber', { v: Math.round(g) }) });
    }
    if (w != null) {
      if (w > THRESHOLDS.windMph.redAt) factors.push({ level: 'nogo', msg: t('reasons.windRed', { v: Math.round(w) }) });
      else if (w > THRESHOLDS.windMph.amberAt) factors.push({ level: 'caution', msg: t('reasons.windAmber', { v: Math.round(w) }) });
    }
    if (wx.rain24hMm != null && wx.rain24hMm >= THRESHOLDS.rain.last24hMm)
      factors.push({ level: 'caution', msg: t('reasons.rain24', { v: wx.rain24hMm }) });
    if (wx.rainNext6hMm != null && wx.rainNext6hMm >= THRESHOLDS.rain.next6hMm)
      factors.push({ level: 'caution', msg: t('reasons.rain6') });
  }

  if (river && !river.unavailable && river.valueM != null) {
    sawData = true;
    const v = river.valueM, hi = river.typicalHigh, lo = river.typicalLow;
    if (hi != null) {
      if (v > hi * THRESHOLDS.river.redAboveHighFactor)
        factors.push({ level: 'nogo', msg: t('reasons.riverRed', { v: round1(v) }) });
      else if (v > hi)
        factors.push({ level: 'caution', msg: t('reasons.riverAmber', { v: round1(v) }) });
      else if (lo != null && v < lo)
        factors.push({ level: 'go', msg: t('reasons.riverLowNote', { v: round1(v) }) });
    }
    /* No typical range → neutral: value shown elsewhere, never coloured. */
  }

  if (sewageNear === true) {
    sawData = true;
    /* Advisory only — amber at most, never red, never "unsafe". */
    factors.push({ level: 'caution', msg: t('reasons.sewage') });
  }

  let level = sawData ? 'go' : 'unknown';
  for (const f of factors) level = worse(level, f.level);

  const drivers = factors.filter((f) => f.level !== 'go');
  drivers.sort((a, b) => LEVEL_ORDER[b.level] - LEVEL_ORDER[a.level]);
  const reason = level === 'unknown' ? t('reasons.noData')
    : drivers.length ? drivers.map((f) => f.msg).join(' · ')
    : t('reasons.allClear');

  return { level, reason, factors };
}

function bannerTargetId() {
  if (state.selectedId) return state.selectedId;
  if (state.userPos) {
    let best = null, bestKm = Infinity;
    for (const s of LAUNCH_POINTS) {
      const km = haversineKm(state.userPos.lat, state.userPos.lng, s.lat, s.lng);
      if (km < bestKm) { bestKm = km; best = s.id; }

  const id = bannerTargetId(); if (!id) return;
  const a = state.assessments[id];
  const wx = a && a.wx, rv = a && a.river;

  if (wx) {
    const dir = wx.windDirDeg != null ? wx.windDirDeg : 0;
    const arrow = '<span class="wind-arrow" style="transform:rotate(' + ((dir + 180) % 360) + 'deg)">↑</span>';
    cellSet('#c-wind',
      arrow + ' ' + Math.round(wx.windMph),
      compassFrom(dir) + ' · ' + t('mph'),
      wx.windMph > THRESHOLDS.windMph.redAt ? 'bad' : wx.windMph > THRESHOLDS.windMph.amberAt ? 'warn' : null);
    cellSet('#c-gust', String(Math.round(wx.gustMph)), t('mph'),
      wx.gustMph > THRESHOLDS.gustMph.redAt ? 'bad' : wx.gustMph > THRESHOLDS.gustMph.amberAt ? 'warn' : null);
    const r6 = wx.rainNext6hMm != null ? wx.rainNext6hMm : '—';
    cellSet('#c-rain', String(r6), t('mm') + (wx.tempC != null ? ' · ' + Math.round(wx.tempC) + '°C' : ''),
      wx.rainNext6hMm >= THRESHOLDS.rain.next6hMm ? 'warn' : null);
  } else {
    cellSet('#c-wind', '—', '', null); cellSet('#c-gust', '—', '', null); cellSet('#c-rain', '—', '', null);
  }

  if (rv && !rv.unavailable && rv.valueM != null) {
    let label = t('riverNoRange'), tone = null;
    if (rv.typicalHigh != null) {
      if (rv.valueM > rv.typicalHigh * THRESHOLDS.river.redAboveHighFactor) { label = t('riverVeryHigh'); tone = 'bad'; }
      else if (rv.valueM > rv.typicalHigh) { label = t('riverHigh'); tone = 'warn'; }
      else if (rv.typicalLow != null && rv.valueM < rv.typicalLow) { label = t('riverLow'); }
      else label = t('riverNormal');
    }
    cellSet('#c-river', round1(rv.valueM) + '<span style="font-size:.7em"> m</span>', label, tone);
  } else {
    cellSet('#c-river', '—', rv && rv.unavailable ? t('riverUnavailable') : '', null);
  }

  /* footer: freshness + gauge name */
  const bits = [];
  if (a && a.at) bits.push(a.stale ? t('staleNote', { t: fmtTime(a.at) }) : t('updated', { t: fmtTime(a.at) }));
  if (rv && rv.stationLabel) bits.push((rv.auto ? t('gaugeAuto') : t('gauge')) + ': ' + rv.stationLabel);
  if (!navigator.onLine) bits.push(t('offline'));
  $('#cond-foot').textContent = bits.join(' · ');
}

function selectSpot(id, openSheet) {
  const prev = state.selectedId;
  state.selectedId = id;
  if (prev && spotMarkers[prev]) paintPin(prev);
  paintPin(id);
  renderBanner(); renderConditions();
  if (openSheet) renderSheet(id);
}

function renderSheet(id) {
  const spot = LAUNCH_POINTS.find((s) => s.id === id); if (!spot) return;
  const a = state.assessments[id];

  $('#d-name').textContent = spot.name;
  const subBits = [spot.waterway];
  if (state.userPos) subBits.push(t('distanceAway', { v: round1(haversineKm(state.userPos.lat, state.userPos.lng, spot.lat, spot.lng)) }));
  $('#d-sub').textContent = subBits.join(' · ');

  const badges = [t('launchType.' + spot.launchType) || spot.launchType,
                  t('difficulty.' + spot.difficulty) || spot.difficulty];
  $('#d-badges').innerHTML = badges.map((b) => '<span class="badge">' + esc(b) + '</span>').join('') +
    (spot.placeholder ? '<span class="badge" style="border-color:#E7C979;background:#FBF3DC">' + esc(t('placeholderNote')) + '</span>' : '');

  /* Verdict + contributing factors, always with plain-English reasons */
  const v = a && a.verdict;
  if (v) {
    const rows = v.factors.length
      ? v.factors.map((f) => '<div class="factor"><span class="dot" style="background:' + VERDICT_COLOR[f.level] + '"></span><span>' + esc(f.msg) + '</span></div>').join('')
      : '<div class="factor"><span class="dot" style="background:' + VERDICT_COLOR.go + '"></span><span>' + esc(t('reasons.allClear')) + '</span></div>';
    $('#d-verdict').innerHTML =
      '<div class="kv"><b style="color:' + VERDICT_COLOR[v.level] + ';font-family:var(--display);font-size:1.05rem">' +
      t('verdictEmoji.' + v.level) + ' ' + t('verdict.' + v.level) + '</b> — ' + esc(t('whyVerdict')) + ':</div>' + rows;
  } else {
    $('#d-verdict').innerHTML = '<div class="kv muted">' + esc(t('loading')) + '</div>';
  }

  /* River line */
  const rv = a && a.river;
  $('#d-river').innerHTML = (rv && !rv.unavailable && rv.valueM != null)
    ? '<b>' + esc(t('cells.river')) + ':</b> ' + round1(rv.valueM) + ' m at ' + esc(rv.stationLabel) +
      (rv.typicalHigh != null
        ? ' (typical ' + round1(rv.typicalLow != null ? rv.typicalLow : 0) + '–' + round1(rv.typicalHigh) + ' m)'
        : ' — ' + esc(t('riverNoRange')))
    : '<span class="muted">' + esc(t('riverUnavailable')) + '</span>';

  /* Static info from the curated data */
  const p = spot.parking || {};
  $('#d-parkinfo').innerHTML = '<b>' + esc(t('parkingHeading')) + ':</b> ' +
    esc([p.name, p.postcode].filter(Boolean).join(', ') || '—') +
    (p.type ? ' · ' + esc(t(p.type)) : '');
  $('#d-route').innerHTML = spot.route ? '<b>' + esc(t('route')) + ':</b> ' + esc(spot.route) : '';
  $('#d-hazards').innerHTML = spot.hazards ? '<div class="hazard">⚠️ <b>' + esc(t('hazards')) + ':</b> ' + esc(spot.hazards) + '</div>' : '';
  $('#d-notes').textContent = spot.notes || '';

  /* Action buttons */
  const acts = [];
  if (spot.w3w) {
    acts.push('<a class="act" target="_blank" rel="noopener" href="https://what3words.com/' + encodeURIComponent(spot.w3w) + '">/// ' + esc(t('actions.w3w')) + '</a>');
  }
  acts.push('<a class="act primary" target="_blank" rel="noopener" href="https://maps.google.com/?q=' + spot.lat + ',' + spot.lng + '">🧭 ' + esc(t('actions.directions')) + '</a>');
  acts.push('<button class="act" id="act-carparks">🅿️ ' + esc(t('actions.carparks')) + '</button>');
  acts.push('<a class="act" target="_blank" rel="noopener" href="' + CONFIG.PARK4NIGHT_URL + '">🌙 ' + esc(t('actions.overnight')) + '</a>');
  acts.push('<button class="act" id="act-share">↗️ ' + esc(t('actions.share')) + '</button>');
  $('#d-actions').innerHTML = acts.join('');

  $('#act-carparks').addEventListener('click', () => loadParkingFor(spot));
  $('#act-share').addEventListener('click', () => shareSpot(spot));

  /* Previously fetched parking for this spot */
  renderParkingList(id);

  document.body.classList.add('sheet-open');
}

function closeSheet() { document.body.classList.remove('sheet-open'); }

async function loadParkingFor(spot) {
  const box = $('#d-parking-results');
  box.innerHTML = '<p class="muted">' + esc(t('parkingLoading')) + '</p>';
  const res = await getParking(spot);
  if (!res) { box.innerHTML = '<p class="muted">' + esc(t('parkingError')) + '</p>'; return; }
  state.parkingResults[spot.id] = res.value;
  renderParkingList(spot.id);
  renderParkingMarkers(spot, res.value);
}

function renderParkingList(spotId) {
  const box = $('#d-parking-results');
  const res = state.parkingResults[spotId];
  if (!res) { box.innerHTML = ''; return; }
  if (!res.parking.length) { box.innerHTML = '<p class="muted">' + esc(t('parkingNone')) + '</p>'; return; }
  let html = '<ul class="parking-list">' + res.parking.map((p) =>
    '<li><b>' + esc(p.name || t('parkingHeading')) + '</b> · ' + p.km + ' km' +
    (p.fee === 'yes' ? ' · ' + esc(t('paid')) : p.fee === 'no' ? ' · ' + esc(t('free')) : '') +
    (p.access && p.access !== 'yes' ? ' · ' + esc(p.access) : '') + '</li>').join('') + '</ul>';
  if (res.slipways.length) html += '<p class="muted">' + esc(t('slipwaysFound', { v: res.slipways.length })) + '</p>';
  box.innerHTML = html;
}

async function shareSpot(spot) {
  const url = 'https://maps.google.com/?q=' + spot.lat + ',' + spot.lng;
  let text = spot.name + ' — ' + spot.waterway;
  /* Stored W3W wins; else, if a key is configured, convert live (§5.5).
     No key → the Google Maps pin alone is the fallback. */
  const words = spot.w3w || await w3wForCoords(spot.lat, spot.lng);
  if (words) text += ' · ///' + words;
  try {
    if (navigator.share) await navigator.share({ title: 'PaddleReady', text, url });
    else { await navigator.clipboard.writeText(text + ' ' + url); toast(t('copied')); }
  } catch (e) {
    try { await navigator.clipboard.writeText(text + ' ' + url); toast(t('shareFail')); } catch (_) {}
  }
}

/* ---- Info modal ---- */
function renderInfoModal() {
  $('#m-title').textContent = t('infoTitle');
  const i = STRINGS[LANG].info;
  $('#m-body').innerHTML =
    '<p>' + esc(i.p1) + '</p>' +
    '<p>' + esc(i.p2) + '</p>' +
    '<h3>' + esc(i.howTitle) + '</h3><p>' + esc(i.how) + '</p>' +
    '<h3>' + esc(i.attribution) + '</h3>' +
    '<ul><li>' + esc(i.a1) + '</li><li>' + esc(i.a2) + '</li><li>' + esc(i.a3) + '</li></ul>' +
    '<p class="muted">' + esc(t('sewageLegend')) + '</p>';
  $('#m-ver').textContent = 'PaddleReady ' + CONFIG.APP_VERSION;
}

/* ---- Toggles ---- */
function setToggle(name, on) {
  state.toggles[name] = on;
  $('#tg-' + name).setAttribute('aria-pressed', String(on));
}
function onToggleSewage() {
  const on = !state.toggles.sewage;
  setToggle('sewage', on);
  if (!on) { if (sewageLayer) map.removeLayer(sewageLayer); return; }
  if (state.sewage.status === 'unconfigured') { toast(t('sewageUnconfigured')); setToggle('sewage', false); return; }
  if (state.sewage.status === 'error') { toast(t('sewageUnavailable')); setToggle('sewage', false); return; }
  if (state.sewage.fc) { renderSewageLayer(state.sewage.fc); toast(t('sewageLegend')); }
}
function onToggleParking() {
  const on = !state.toggles.parking;
  setToggle('parking', on);
  if (on) parkingLayer.addTo(map); else map.removeLayer(parkingLayer);
}

/* ---- Geolocation (foreground only, on demand) ---- */
function locateMe() {
  if (!('geolocation' in navigator)) { toast(t('locateDenied')); return; }
  toast(t('locating'));
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      state.userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      showUser(state.userPos.lat, state.userPos.lng);
      map.setView([state.userPos.lat, state.userPos.lng], Math.max(map.getZoom(), 11));
      if (!state.selectedId) { renderBanner(); renderConditions(); }
      const id = bannerTargetId(); if (id) paintPin(id);
    },
    () => toast(t('locateDenied')),
    { enableHighAccuracy: false, timeout: 12000, maximumAge: 120000 }
  );
}

/* ========================= S8 EVENTS + BOOT ============================= */
async function assessAll() {
  /* Sewage is one shared national file; fetch it once (if configured). */
  const sewagePromise = getSewage().then((s) => {
    state.sewage = { status: s.status, fc: s.fc || null };
    if (s.status === 'ok' && state.toggles.sewage) renderSewageLayer(s.fc);
  });

  /* Per spot: weather + river in parallel; paint progressively. */
  await Promise.allSettled(LAUNCH_POINTS.map(async (spot) => {
    const [wxRes, rvRes] = await Promise.allSettled([getWeather(spot), getRiver(spot)]);
    const wx = wxRes.status === 'fulfilled' && wxRes.value ? wxRes.value.value : null;
    const rv = rvRes.status === 'fulfilled' && rvRes.value ? rvRes.value.value : null;
    const at = Math.max(
      wxRes.status === 'fulfilled' && wxRes.value ? wxRes.value.at : 0,
      rvRes.status === 'fulfilled' && rvRes.value ? rvRes.value.at : 0) || null;
    const stale = (wxRes.status === 'fulfilled' && wxRes.value && wxRes.value.stale) ||
                  (rvRes.status === 'fulfilled' && rvRes.value && rvRes.value.stale) || false;

    await sewagePromise;
    const near = state.sewage.status === 'ok' ? sewageNearSpot(state.sewage.fc, spot) : null;

    state.assessments[spot.id] = {
      wx, river: rv, sewageNear: near, at, stale,
      verdict: assessSpot(wx, rv, near)
    };
    paintPin(spot.id);
    if (spot.id === bannerTargetId()) { renderBanner(); renderConditions(); }
    if (document.body.classList.contains('sheet-open') && spot.id === state.selectedId) renderSheet(spot.id);
  }));
  renderBanner(); renderConditions();
}

function applyStaticStrings() {
  $('#s-tagline').textContent = t('tagline');
  $('#s-advisory').textContent = t('advisory');
  $('#s-tg-sewage').textContent = t('toggles.sewage');
  $('#s-tg-parking').textContent = t('toggles.parking');
  $('#s-wind').textContent = t('cells.wind');
  $('#s-gust').textContent = t('cells.gust');
  $('#s-rain').textContent = t('cells.rain');
  $('#s-river').textContent = t('cells.river');
  $('#v-reason').textContent = t('loading');
}

function boot() {
  applyStaticStrings();
  renderInfoModal();
  initMap();
  setupPWA();

  $('#btn-info').addEventListener('click', () => $('#modal').classList.add('open'));
  $('#btn-modal-close').addEventListener('click', () => $('#modal').classList.remove('open'));
  $('#modal').addEventListener('click', (e) => { if (e.target === $('#modal')) $('#modal').classList.remove('open'); });
  $('#btn-sheet-close').addEventListener('click', closeSheet);
  $('#sheet-backdrop').addEventListener('click', closeSheet);
  $('#tg-sewage').addEventListener('click', onToggleSewage);
  $('#tg-parking').addEventListener('click', onToggleParking);
  $('#btn-locate').addEventListener('click', locateMe);
  window.addEventListener('online', renderConditions);
  window.addEventListener('offline', renderConditions);

  assessAll();
}

/* ======================== S9 PWA (single-file) ========================== */
function setupPWA() {
  /* Manifest as a runtime Blob URL keeps everything in one file. */
  const icon = 'data:image/svg+xml,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">' +
    '<rect width="100" height="100" rx="22" fill="#14646E"/>' +
    '<path d="M30 72 Q50 60 70 72" stroke="#F2F6F5" stroke-width="6" fill="none" stroke-linecap="round"/>' +
    '<line x1="62" y1="20" x2="44" y2="66" stroke="#F2F6F5" stroke-width="6" stroke-linecap="round"/>' +
    '<ellipse cx="64.5" cy="16" rx="7" ry="10" fill="#F2F6F5" transform="rotate(21 64.5 16)"/>' +
    '</svg>');
  const manifest = {
    name: 'PaddleReady', short_name: 'PaddleReady',
    description: 'Go / No-Go pre-trip dashboard for UK SUP.',
    start_url: '.', scope: '.', display: 'standalone',
    background_color: '#F2F6F5', theme_color: '#14646E',
    icons: [{ src: icon, sizes: 'any', type: 'image/svg+xml', purpose: 'any' }]
  };
  try {
    $('#manifest-link').href = URL.createObjectURL(
      new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' }));
    $('#apple-icon').href = icon;
  } catch (e) { dbg('manifest blob failed', e); }

  /* Offline data already works via localStorage. Caching the app SHELL
     needs a real sibling sw.js file (browsers refuse Blob/data service
     workers) — that is the one thing a single HTML file cannot do. If
     you add the sw.js from the commented block at the bottom of this
     file, it is picked up automatically here; if not, nothing breaks. */
  if ('serviceWorker' in navigator && location.protocol === 'https:') {
    fetch('sw.js', { method: 'HEAD' })
      .then((r) => { if (r.ok) navigator.serviceWorker.register('sw.js'); })
      .catch(() => { /* no sw.js present — fine */ });
  }
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
else boot();
</script>

const SHELL = 'paddleready-shell-v1';
const ASSETS = [
  './',
  'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css',
  'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js',
  'https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800&display=swap'
];
self.addEventListener('install', (e) => {
  e.waitUntil(caches.open(SHELL).then((c) => c.addAll(ASSETS)).then(() => self.skipWaiting()));
});
self.addEventListener('activate', (e) => {
  e.waitUntil(caches.keys().then((keys) =>
    Promise.all(keys.filter((k) => k !== SHELL).map((k) => caches.delete(k)))
  ).then(() => self.clients.claim()));
});
self.addEventListener('fetch', (e) => {
  const url = new URL(e.request.url);
  // Never intercept live data APIs — the page handles its own caching.
  if (/open-meteo|environment\.data|overpass|what3words|tile\.openstreetmap/.test(url.host)) return;
  if (e.request.mode === 'navigate') {
    e.respondWith(fetch(e.request).catch(() => caches.match('./')));
    return;
  }
  e.respondWith(caches.match(e.request).then((hit) => hit || fetch(e.request)));
});
